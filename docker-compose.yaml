services:
  backend:
    container_name: coresix-backend
    image: backend:latest
    build: ./server
    ports:
      - "5239:5000"
    env_file:
      - .env
      
    networks:
      - app-network

  frontend:
    container_name: coresix-frontend
    image: frontend:latest
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge