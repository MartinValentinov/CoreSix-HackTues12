apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lifecore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: viktorsirakov08/lifecore-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: jwt
          envFrom:
            - configMapRef:
                name: backend-config